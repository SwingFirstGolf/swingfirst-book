<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SwingFirst — Cancel Booking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  background:#f2f9f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 32px rgba(0,0,0,.1);
  width:100%;max-width:440px;overflow:hidden;}
.card-head{background:#0b3d2e;padding:28px 32px;text-align:center;}
.card-head .icon{font-size:32px;margin-bottom:8px;}
.card-head h1{color:#fff;font-size:20px;font-weight:800;letter-spacing:-.01em;}
.card-head p{color:rgba(255,255,255,.55);font-size:13px;margin-top:4px;}
.card-body{padding:28px 32px;}

label{display:block;font-size:11px;font-weight:700;color:#3b4a42;
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
input{width:100%;padding:11px 14px;border:1.5px solid #e4e9e6;border-radius:10px;
  font:inherit;font-size:14px;color:#0d1f17;outline:none;transition:border-color .15s;}
input:focus{border-color:#1b6b4f;}
.field{margin-bottom:16px;}
.btn{width:100%;padding:13px;background:#9A2A42;color:#fff;border:none;
  border-radius:10px;font:inherit;font-size:15px;font-weight:700;cursor:pointer;
  transition:background .15s;margin-top:4px;}
.btn:hover{background:#7c1e33;}
.btn:disabled{background:#c9a0a9;cursor:not-allowed;}
.err{background:#fff1f4;border:1px solid #f5c2ce;color:#9A2A42;
  border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.hint{font-size:12px;color:#6b7a72;margin-top:16px;text-align:center;line-height:1.6;}
.hint a{color:#1b6b4f;font-weight:600;}

/* Success state */
.success-state{display:none;text-align:center;padding:32px;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-title{font-size:20px;font-weight:800;color:#0d1f17;margin-bottom:8px;}
.success-ref{display:inline-block;font-size:14px;font-weight:700;color:#9A2A42;
  background:#fff1f4;border:1.5px solid #f5c2ce;border-radius:8px;
  padding:8px 18px;margin-bottom:16px;letter-spacing:.04em;}
.success-sub{font-size:13px;color:#6b7a72;line-height:1.7;}
.new-booking-btn{display:inline-block;margin-top:20px;padding:11px 24px;
  background:#1b6b4f;color:#fff;border-radius:10px;font-size:14px;
  font-weight:700;text-decoration:none;transition:background .15s;}
.new-booking-btn:hover{background:#0b3d2e;}
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <div class="icon">⛳</div>
    <h1>SwingFirst</h1>
    <p>Cancel your booking</p>
  </div>

  <!-- Form state -->
  <div class="card-body" id="formState">
    <div class="err" id="errMsg"></div>
    <div class="field">
      <label for="refInput">Confirmation code</label>
      <input id="refInput" type="text" placeholder="e.g. CL26AP23TH001"
             autocomplete="off" autocorrect="off" autocapitalize="characters"
             style="letter-spacing:.08em;font-weight:700;"/>
    </div>
    <div class="field">
      <label for="emailInput">Email address on the booking</label>
      <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <button class="btn" id="cancelBtn">Cancel my booking</button>
    <div class="hint">
      Your confirmation code is in the email or SMS you received when you booked.<br/>
      Changed your mind? <a href="https://book.swingfirst.ai">Book a new tee time →</a>
    </div>
  </div>

  <!-- Success state -->
  <div class="success-state" id="successState">
    <div class="success-icon">✓</div>
    <div class="success-title">Booking cancelled</div>
    <div class="success-ref" id="successRef">—</div>
    <div class="success-sub">
      Your booking has been cancelled and a confirmation<br/>
      has been sent to your email address.
    </div>
    <a href="https://book.swingfirst.ai" class="new-booking-btn">Book a new tee time</a>
  </div>
</div>

<script>
// Pre-fill ref from URL param ?ref=XXX (linked from email)
(function() {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) {
    const inp = document.getElementById('refInput');
    inp.value = ref.toUpperCase();
    setTimeout(() => document.getElementById('emailInput').focus(), 100);
  }
})();

// Normalise ref as user types
document.getElementById('refInput').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});

document.getElementById('cancelBtn').addEventListener('click', async () => {
  const ref   = document.getElementById('refInput').value.trim().toUpperCase();
  const email = document.getElementById('emailInput').value.trim();
  const errEl = document.getElementById('errMsg');
  const btn   = document.getElementById('cancelBtn');

  errEl.style.display = 'none';

  if (!ref) { showErr('Please enter your confirmation code.'); return; }
  if (!email) { showErr('Please enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Cancelling…';

  try {
    const res = await fetch('/.netlify/functions/cancel-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref, email }),
    });
    const data = await res.json();

    if (!res.ok) {
      showErr(data.error || 'Something went wrong — please try again.');
      btn.disabled = false;
      btn.textContent = 'Cancel my booking';
      return;
    }

    // Show success
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successRef').textContent = ref;
    document.getElementById('successState').style.display = 'block';

  } catch(e) {
    showErr('Network error — please check your connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Cancel my booking';
  }
});

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
